[package]
name = "map-engine"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
wgpu = "22"
maplibre = { version = "0.0.3", features = ["headless"] }
maplibre_native = { version = "0.4.0", default-features = false, features = ["log", "pool", "metal"] }
image = "0.24"
bytemuck = { version = "1", features = ["derive"] }
futures = "0.3"
log = "0.4"
env_logger = "0.10"
anyhow = "1"
pollster = "0.3"
url = "2.5.8"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rayon = "1.8"
